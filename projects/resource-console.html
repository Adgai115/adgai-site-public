<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="description" content="Adgai 构建本地优先的 AI 系统、资源编排工具和知识自动化工作流。">
  <title>OpenClaw 资源后台 - Adgai</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/assets/site.js" defer></script>
</head>
<body data-page="project-resource-console">
  <header class="site-header">
    <a class="brand" href="/">Adgai</a>
    <div class="header-actions">
      <nav aria-label="Primary"><a href="/" data-i18n="nav.home">首页</a></nav>
      <div class="language-toggle" aria-label="Language">
        <button type="button" data-lang-option="zh-CN">中</button>
        <button type="button" data-lang-option="en">EN</button>
      </div>
    </div>
  </header>
  <main class="article">
    <p class="eyebrow" data-i18n="projectPages.resource.eyebrow">项目</p>
    <h1 data-i18n="projectPages.resource.title">OpenClaw 资源后台</h1>
    <p class="lead" data-i18n="projectPages.resource.lead">面向 AI 模型、工具、计划任务和知识产出的本地优先运行工作台。公开版本只描述方法，不暴露私有资源状态。</p>

      <p data-i18n="projectPages.resource.principlesText">运行数据保留在本地，只导出审核后的摘要，并显式展示采集的新鲜度。</p>
    </section>
    <section>
      <h2 data-i18n="projectPages.resource.boundaryTitle">公开边界</h2>
      <p data-i18n="projectPages.resource.boundaryText">这个项目页不会展示实时进程数、私有路径、日志或原始自动化输出。</p>
